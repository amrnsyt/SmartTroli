<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>SmartTroli — Shopping List</title>
<meta name="description" content="Track grocery items and live trolley totals as you shop — offline-ready, in RM.">
<meta name="theme-color" content="#2F5233">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          troli: {
            bg: '#F6F4EE',
            bgdark: '#14170F',
            card: '#FFFFFF',
            carddark: '#1E2317',
            green: '#2F5233',
            greenlight: '#4C7A3F',
            rail: '#DDD8C6',
            raildark: '#2A3021',
            orange: '#D9622B',
            ink: '#1B1F16',
            inkdark: '#EDEAE0',
            sub: '#6B7060',
            subdark: '#9BA28A'
          }
        },
        fontFamily: {
          display: ['Georgia', 'ui-serif', 'serif'],
          body: ['-apple-system', 'system-ui', 'sans-serif']
        }
      }
    }
  }
</script>
<style>
  html, body { height: 100%; }
  .strike-anim { transition: opacity .25s ease, text-decoration-color .25s ease; }
  ::-webkit-scrollbar { width: 0px; }
  input[type="checkbox"].troli-check {
    appearance: none;
    width: 26px; height: 26px;
    border: 2px solid #4C7A3F;
    border-radius: 50%;
    display: grid;
    place-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  input[type="checkbox"].troli-check::before {
    content: "";
    width: 12px; height: 12px;
    transform: scale(0);
    transition: transform .15s ease-in-out;
    box-shadow: inset 1em 1em #2F5233;
    clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  }
  input[type="checkbox"].troli-check:checked::before { transform: scale(1); }
  .dark input[type="checkbox"].troli-check { border-color: #7FA96B; }
  .dark input[type="checkbox"].troli-check::before { box-shadow: inset 1em 1em #7FA96B; }
</style>
</head>
<body class="bg-troli-bg dark:bg-troli-bgdark font-body text-troli-ink dark:text-troli-inkdark h-screen flex flex-col overflow-hidden transition-colors">

  <!-- STICKY TOP: Header + Branding + Clear All -->
  <header class="shrink-0 px-5 pt-6 pb-3 bg-troli-bg/95 dark:bg-troli-bgdark/95 backdrop-blur-sm border-b border-troli-rail dark:border-troli-raildark z-20">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-full bg-troli-green dark:bg-troli-greenlight flex items-center justify-center text-xl shrink-0">🛒</div>
        <div>
          <h1 class="font-display text-2xl leading-tight tracking-tight text-troli-green dark:text-troli-inkdark">SmartTroli</h1>
          <p class="text-[11px] text-troli-sub dark:text-troli-subdark tracking-wide uppercase">Shop smart, spend sure</p>
        </div>
      </div>
      <button id="clearAllBtn" type="button"
        class="text-[11px] uppercase tracking-wider text-troli-orange border border-troli-orange/40 rounded-full px-3 py-1.5 active:scale-95 transition-transform shrink-0">Clear All</button>
    </div>

    <!-- Trolley Rail progress -->
    <div class="mt-3">
      <div class="flex justify-between items-end mb-1">
        <span class="text-[10px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark">In trolley</span>
        <span id="railPercent" class="text-[10px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark">0%</span>
      </div>
      <div class="h-2 rounded-full bg-troli-rail dark:bg-troli-raildark overflow-hidden">
        <div id="railFill" class="h-full bg-troli-green dark:bg-troli-greenlight rounded-full" style="width:0%; transition: width .35s ease;"></div>
      </div>
    </div>

    <!-- Add Item Form -->
    <form id="addForm" class="mt-3 flex gap-2">
      <input id="itemName" type="text" placeholder="Item name" required autocomplete="off"
        class="flex-1 min-w-0 bg-troli-card dark:bg-troli-carddark rounded-full px-4 py-2.5 text-sm border border-troli-rail dark:border-troli-raildark focus:border-troli-green dark:focus:border-troli-greenlight outline-none placeholder:text-troli-sub dark:placeholder:text-troli-subdark" />
      <input id="itemPrice" type="number" step="0.01" min="0" placeholder="RM Price" required inputmode="decimal"
        class="w-24 bg-troli-card dark:bg-troli-carddark rounded-full px-3 py-2.5 text-sm border border-troli-rail dark:border-troli-raildark focus:border-troli-green dark:focus:border-troli-greenlight outline-none placeholder:text-troli-sub dark:placeholder:text-troli-subdark" />
      <button type="submit"
        class="w-11 h-11 rounded-full bg-troli-orange text-white text-xl leading-none flex items-center justify-center shadow-sm active:scale-95 transition-transform shrink-0">+</button>
    </form>
  </header>

  <!-- SCROLLABLE CENTER: Grocery list -->
  <main class="flex-1 overflow-y-auto px-5 py-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="text-[11px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark">Your list</h2>
      <span id="itemCount" class="text-[11px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark">0 items</span>
    </div>

    <ul id="itemList" class="space-y-2"></ul>

    <div id="emptyState" class="text-center py-16">
      <div class="text-4xl mb-2">🥬</div>
      <p class="text-sm text-troli-sub dark:text-troli-subdark">Your trolley is empty.<br>Add your first item above!</p>
    </div>
  </main>

  <!-- STICKY BOTTOM: Dual real-time totals -->
  <footer class="shrink-0 px-5 py-4 bg-troli-card dark:bg-troli-carddark border-t border-troli-rail dark:border-troli-raildark grid grid-cols-2 gap-3 z-20" style="padding-bottom: max(1rem, env(safe-area-inset-bottom));">
    <div>
      <p class="text-[11px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark mb-0.5">Total Estimated Price</p>
      <p id="estTotal" class="font-display text-xl text-troli-ink dark:text-troli-inkdark">RM 0.00</p>
    </div>
    <div class="text-right">
      <p class="text-[11px] uppercase tracking-wider text-troli-sub dark:text-troli-subdark mb-0.5">Trolley Total</p>
      <p id="troliTotal" class="font-display text-xl text-troli-green dark:text-troli-greenlight">RM 0.00</p>
    </div>
  </footer>

  <!-- Update Toast (SW update banner) -->
  <div id="updateToast" class="hidden fixed bottom-24 left-4 right-4 z-50">
    <div class="max-w-md mx-auto bg-troli-ink dark:bg-troli-carddark text-white rounded-2xl px-4 py-3 shadow-lg flex items-center justify-between gap-3 border border-white/10">
      <span class="text-sm">New version available!</span>
      <button id="updateRefreshBtn" type="button"
        class="text-sm font-semibold bg-troli-orange text-white rounded-full px-4 py-1.5 active:scale-95 transition-transform shrink-0">Update Now</button>
    </div>
  </div>

  <script src="/app.js" defer></script>
  <script>
    let waitingWorker = null;

    function showUpdateToast(worker) {
      waitingWorker = worker;
      document.getElementById('updateToast').classList.remove('hidden');
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          // A worker is already waiting when this page loads.
          if (reg.waiting) {
            showUpdateToast(reg.waiting);
          }

          // A new worker starts installing during this session.
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateToast(newWorker);
              }
            });
          });

          // Poll for new deploys so long-open tabs (common mid-shopping) notice updates.
          setInterval(() => reg.update(), 60 * 1000);
        }).catch(() => {});

        // Reload once the new worker has taken control.
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }

    document.getElementById('updateRefreshBtn').addEventListener('click', () => {
      if (waitingWorker) {
        waitingWorker.postMessage('skipWaiting');
      }
      document.getElementById('updateToast').classList.add('hidden');
    });
  </script>
</body>
</html>
